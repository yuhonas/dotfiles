- name: install third party fonts used in terminal and other places
  homebrew_cask: name={{ item }} state=present
  with_items:
    - font-fira-code
    - font-hack
    - font-jetbrains-mono

- name: remove all dock items for a fresh start
  ansible.builtin.shell: dockutil --remove all --no-restart

- name: add desired dock items
  ansible.builtin.shell: dockutil --add '{{ item }}' --no-restart
  with_items:
      - /Applications/Calendar.app
      - /Applications/Brave Browser.app
      - Finder
      - /Applications/Ghostty.app
      - /Applications/Spotify.app
      - /Applications/Visual Studio Code.app
      - /Applications/Zen.app

- name: restart dock to apply changes
  ansible.builtin.shell: killall Dock
