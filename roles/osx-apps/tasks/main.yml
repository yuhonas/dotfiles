- name: update homebrew
  homebrew: update_homebrew=yes

- name: applications
  homebrew_cask: name={{ item }} state=present
  with_items:
    - 1password
    # - amethyst # tiling window manager
    # - bitbar # for showing custom scripts in the menu bar
    - caffeine # for preventing sleep when doing long tasks
    - karabiner-elements # keyboard remapping
    - google-drive
    # - handbrake
    - monitorcontrol # for brightness control support on external monitors
    # - noti # for notifications
    - obsidian # awesome note taking app
    - rectangle # for window management
    # - signal
    - spotify
    - raycast # spotlight replacement
    - tor-browser
    - uninstallpkg
    - vlc
    - zappy # better screenshot tool
    - zen # privacy and productivity focussed web browser

- name: other helpful command line tools
  homebrew: name={{ item }} state=present
  with_items:
    - bash  # the version of bash that ships with macos (3.2.x) is outdated
    - dockutil # for managing dock items from the command line
    - rsync # the version of rsync that ships with macos (2.6.9) is outdated
    - switchaudio-osx # for switching audio devices from the command line

- name: developer applications
  homebrew_cask: name={{ item }} state=present
  with_items:
    - ghostty # terminal app optimized for mac silicon
    - kitty
    - orbstack # docker replacement optimized for mac silicon
    - postico # postgres client
    - visual-studio-code
    # - warp

- name: ensure we have a directory for custom key bindings
  file: path={{ ansible_env.HOME }}/Library/KeyBindings state=directory mode=700

# copy custom macos keybindings
# symlinking causes issues in some apps
# see https://itectec.com/askdifferent/textedit-key-bindings-modified-in-defaultkeybinding-dict-stopped-working/
- name: copying DefaultKeyBinding for custom key bindings in osx text inputs
  copy:
    src: KeyBindings/DefaultKeyBinding.dict
    dest: "{{ ansible_env.HOME }}/Library/KeyBindings"
    mode: 0644

# NOTE: A lot of these seem to be broken/unmaintained
# see https://github.com/sindresorhus/quick-look-plugins
